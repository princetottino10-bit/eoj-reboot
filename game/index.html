<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>異能学園総選挙 Reboot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app { width: 100%; max-width: 900px; padding: 8px; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    /* ── Login Screen ── */
    .screen-login {
      text-align: center;
      padding: 60px 20px;
    }
    .screen-login h1 {
      font-size: 2rem;
      color: #f0c040;
      margin-bottom: 8px;
      text-shadow: 0 0 12px #f0c04060;
    }
    .screen-login .subtitle {
      color: #aaa;
      margin-bottom: 24px;
    }
    .login-note {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .login-error {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 1.2em;
    }

    /* ── Title Screen ── */
    .screen-title {
      text-align: center;
      padding: 60px 20px;
    }
    .screen-title h1 {
      font-size: 2rem;
      color: #f0c040;
      margin-bottom: 8px;
      text-shadow: 0 0 12px #f0c04060;
    }
    .screen-title .subtitle {
      color: #aaa;
      margin-bottom: 16px;
    }
    .login-user {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 28px;
    }
    .btn-text {
      background: none;
      border: none;
      color: #f0c040;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      text-decoration: underline;
    }
    .btn-text:hover { opacity: 0.75; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #f0c040;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: #444;
      color: #e0e0e0;
    }
    .btn-danger {
      background: #c0392b;
      color: #fff;
    }

    /* ── Draft Screen ── */
    .screen-draft { padding: 20px; }
    .screen-draft h2 { text-align: center; color: #f0c040; margin-bottom: 20px; }
    .draft-step { margin-bottom: 20px; }
    .draft-step h3 { color: #aaa; font-size: 0.85rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .faction-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .faction-card {
      background: #16213e;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .faction-card:hover:not(.disabled):not(.picked) { border-color: #f0c040; }
    .faction-card.selected { border-color: #f0c040; background: #2a2a0e; }
    .faction-card.picked { opacity: 0.35; cursor: not-allowed; }
    .faction-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .faction-name-jp { font-size: 1.1rem; font-weight: bold; color: #f0c040; }
    .faction-name-en { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .item-set-card {
      background: #16213e;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .item-set-card:hover:not(.disabled):not(.picked) { border-color: #4ecdc4; }
    .item-set-card.selected { border-color: #4ecdc4; background: #0e2a2a; }
    .item-set-card.picked { opacity: 0.35; cursor: not-allowed; }
    .item-set-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .draft-confirm { margin-top: 16px; text-align: center; }
    .draft-picks {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .draft-picks .pick-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .draft-picks .pick-label { color: #888; }
    .draft-picks .pick-val { color: #e0e0e0; font-weight: bold; }
    .p0-color { color: #4da6ff; }
    .p1-color { color: #ff6b6b; }

    /* ── Pass Screen ── */
    .screen-pass {
      text-align: center;
      padding: 60px 20px;
    }
    .screen-pass h2 { font-size: 1.6rem; margin-bottom: 12px; }
    .screen-pass .pass-note { color: #aaa; margin-bottom: 40px; }

    /* ── Game Screen ── */
    .screen-game { padding: 8px; }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 8px;
    }
    .player-info { text-align: center; }
    .player-info .player-label { font-size: 0.75rem; color: #888; }
    .player-info .player-stat { font-size: 1rem; font-weight: bold; }
    .player-info.active-player { border: 2px solid #f0c040; border-radius: 6px; padding: 4px 8px; }
    .turn-info { text-align: center; }
    .turn-info .turn-num { font-size: 0.75rem; color: #888; }
    .turn-info .active-label { font-size: 0.9rem; color: #f0c040; font-weight: bold; }

    /* Board */
    .board-container { display: flex; justify-content: center; margin-bottom: 10px; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 4px;
      background: #0a0a1a;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 6px;
    }
    .cell {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      border: 2px solid #333;
      cursor: pointer;
      position: relative;
      background: #16213e;
      transition: border-color 0.1s, background 0.1s;
      overflow: hidden;
    }
    .cell:hover { border-color: #555; }
    .cell.valid { border-color: #f0c040; background: #2a2500; }
    .cell.selected { border-color: #f0c040; background: #3a3000; box-shadow: 0 0 8px #f0c04060; }
    .cell.attack-target { border-color: #ff6b6b; background: #2a0000; }
    .cell .cell-attr {
      position: absolute; top: 3px; right: 4px;
      font-size: 0.65rem; color: #666;
    }
    .cell-char {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; padding: 4px;
    }
    .cell-char .char-dir {
      position: absolute; top: 3px; left: 5px;
      font-size: 1rem;
    }
    .cell-char .char-name {
      font-size: 0.7rem; font-weight: bold; text-align: center;
      line-height: 1.2; margin-bottom: 2px;
    }
    .cell-char .char-hp {
      font-size: 0.7rem;
    }
    .cell-char .char-atk {
      font-size: 0.65rem; color: #ffa040;
    }
    .cell-char .char-markers {
      font-size: 0.55rem; color: #4ecdc4; margin-top: 1px;
    }
    .cell.owner-0 { border-color: #2a5a9f; }
    .cell.owner-0.selected { border-color: #4da6ff; box-shadow: 0 0 8px #4da6ff60; }
    .cell.owner-1 { border-color: #9f2a2a; }
    .cell.owner-1.selected { border-color: #ff6b6b; box-shadow: 0 0 8px #ff6b6b60; }

    /* Hand */
    .hand-section {
      background: #16213e;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
    }
    .hand-section h4 { font-size: 0.75rem; color: #888; margin-bottom: 6px; }
    .hand-cards {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .hand-card {
      background: #0f3460;
      border: 2px solid #333;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      min-width: 110px; max-width: 160px;
      text-align: left;
      transition: border-color 0.1s, background 0.1s;
    }
    .hand-card:hover { border-color: #f0c040; }
    .hand-card.selected { border-color: #f0c040; background: #2a2500; box-shadow: 0 0 6px #f0c04060; }
    .hand-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .hand-card .card-name { font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; }
    .hand-card .card-cost { font-size: 0.6rem; color: #4ecdc4; }
    .hand-card .card-stats { font-size: 0.65rem; color: #ffa040; margin-top: 2px; }
    .hand-card .card-keywords { font-size: 0.6rem; color: #51cf66; margin-top: 1px; }
    .hand-card .card-effect {
      font-size: 0.58rem; color: #aaa; margin-top: 3px;
      line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hand-back {
      background: #0a1a2e;
      border: 2px solid #1a2a4e;
      border-radius: 6px;
      width: 44px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      color: #333; font-size: 0.8rem;
    }

    /* Direction picker overlay */
    .dir-picker-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .dir-picker {
      background: #16213e;
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .dir-picker h3 { color: #f0c040; margin-bottom: 16px; font-size: 0.9rem; }
    .dir-grid {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 4px;
    }
    .dir-btn {
      background: #0f3460;
      border: 2px solid #333;
      border-radius: 6px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.1s, background 0.1s;
    }
    .dir-btn:hover { border-color: #f0c040; background: #2a2500; }
    .dir-btn.center { cursor: default; background: #0a0a1a; border-color: #222; }

    /* Action panel */
    .action-panel {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 8px;
    }
    .action-panel .action-label {
      width: 100%; font-size: 0.75rem; color: #888;
      margin-bottom: 2px;
    }

    /* Log */
    .log-section {
      background: #0a0a1a;
      border-radius: 8px;
      padding: 8px;
      max-height: 100px;
      overflow-y: auto;
      margin-bottom: 8px;
      font-size: 0.75rem;
    }
    .log-entry { padding: 1px 0; color: #aaa; }
    .log-entry.damage { color: #ff6b6b; }
    .log-entry.heal { color: #51cf66; }
    .log-entry.system { color: #f0c040; }

    /* Bottom controls */
    .game-controls {
      display: flex; justify-content: space-between; gap: 8px;
      margin-bottom: 8px;
    }

    /* ── Lobby Screen ── */
    .screen-lobby {
      text-align: center;
      padding: 40px 20px;
    }
    .screen-lobby h2 { font-size: 1.6rem; color: #f0c040; margin-bottom: 32px; }
    .lobby-section { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .room-code-input {
      padding: 10px 14px;
      font-size: 1.2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: #16213e;
      border: 2px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      width: 180px;
      text-align: center;
    }
    .room-code-input:focus { outline: none; border-color: #f0c040; }
    .join-error { color: #ff6b6b; font-size: 0.8rem; min-height: 1.2em; }

    /* Room code display (waiting screen) */
    .room-code-display {
      background: #16213e;
      border: 2px solid #f0c040;
      border-radius: 10px;
      padding: 16px 40px;
      margin: 20px auto;
      display: inline-block;
    }
    .room-code-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .room-code-value { font-size: 2.4rem; font-weight: bold; color: #f0c040; letter-spacing: 0.25em; }

    /* Draft waiting banner */
    .waiting-banner {
      background: #1a2a1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 16px;
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 12px;
    }

    /* Over Screen */
    .screen-over {
      text-align: center;
      padding: 60px 20px;
    }
    .screen-over h2 { font-size: 1.8rem; color: #f0c040; margin-bottom: 8px; }
    .screen-over .over-reason { color: #aaa; margin-bottom: 20px; }
    .score-table {
      display: inline-block;
      background: #16213e;
      border-radius: 8px;
      padding: 16px 40px;
      margin-bottom: 30px;
    }
    .score-row { display: flex; justify-content: space-between; gap: 40px; padding: 4px 0; }
    .score-label { color: #888; }
    .score-val { font-weight: bold; font-size: 1.1rem; }

    /* ── Card detail popup ── */
    #card-detail-popup {
      display: none;
      position: fixed;
      z-index: 500;
      width: 230px;
      background: #1a2040;
      border: 2px solid #f0c040;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
      pointer-events: none;
      font-size: 0.75rem;
      line-height: 1.4;
      max-height: 80vh;
      overflow-y: auto;
    }
    #card-detail-popup.modal-mode {
      pointer-events: auto;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(280px, 90vw);
    }
    #card-detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 499;
    }
    .cd-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
    .cd-name { font-size: 0.88rem; font-weight: bold; color: #f0c040; }
    .cd-type { font-size: 0.68rem; color: #888; }
    .cd-meta { font-size: 0.7rem; color: #4ecdc4; }
    .cd-current { font-size: 0.7rem; color: #ffa040; margin-top: 2px; }
    .cd-keywords { font-size: 0.7rem; color: #51cf66; margin-top: 3px; }
    .cd-effect { font-size: 0.7rem; color: #ccc; margin-top: 5px; line-height: 1.5; }
    .cd-ult {
      margin-top: 8px;
      background: #12103a;
      border: 1px solid #6040c0;
      border-radius: 6px;
      padding: 6px 8px;
    }
    .cd-ult-header { font-size: 0.7rem; color: #a080ff; font-weight: bold; }
    .cd-ult-effect { font-size: 0.68rem; color: #ccc; margin-top: 2px; }
    .cd-attack-section { margin-top: 8px; }
    .cd-attack-label { font-size: 0.65rem; color: #888; margin-bottom: 3px; }
    .cd-attack-grid {
      display: grid;
      grid-template-columns: repeat(3, 22px);
      grid-template-rows: repeat(4, 22px);
      gap: 2px;
    }
    .cd-attack-cell {
      width: 22px; height: 22px;
      background: #0a0a1a;
      border: 1px solid #2a2a3a;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem;
    }
    .cd-attack-cell.char-pos { background: #163060; border-color: #4da6ff; color: #4da6ff; }
    .cd-attack-cell.attack-cell { background: #300808; border-color: #ff6b6b; color: #ff6b6b; }
    .cd-attack-cell.weakness-cell { background: #2a1a00; border-color: #ffaa00; color: #ffaa00; }
    .cd-attack-all { font-size: 0.7rem; color: #ffa040; }
    .cd-attack-none { font-size: 0.7rem; color: #666; }
    .cd-grids { display: flex; gap: 10px; margin-top: 8px; }
    .cd-grids .cd-attack-section { margin-top: 0; }

    /* ── Card Review ── */
    body.review-mode {
      align-items: flex-start;
      justify-content: center;
      background: #10121b;
    }
    body.review-mode #app {
      max-width: 1240px;
      padding: 16px;
    }
    .screen-card-review {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: calc(100vh - 32px);
    }
    .review-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      background: #171b28;
      border: 1px solid #2b3246;
      border-radius: 8px;
    }
    .review-header h1 {
      color: #f0c040;
      font-size: 1.35rem;
      margin-bottom: 2px;
    }
    .review-header p,
    .review-header a,
    .review-card-sub,
    .review-count,
    .review-nav small {
      color: #9ca3b8;
      font-size: 0.78rem;
    }
    .review-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .review-action-btn {
      border: 1px solid #3b435a;
      border-radius: 6px;
      padding: 8px 12px;
      background: #f0c040;
      color: #171b28;
      font-weight: 700;
      cursor: pointer;
    }
    .review-action-btn:hover {
      opacity: 0.86;
    }
    .review-toolbar {
      display: grid;
      grid-template-columns: 150px 180px minmax(200px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .review-toolbar select,
    .review-toolbar input,
    .review-side textarea {
      width: 100%;
      background: #171b28;
      color: #e8eaf0;
      border: 1px solid #343c52;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      font-size: 0.88rem;
    }
    .review-toolbar select:focus,
    .review-toolbar input:focus,
    .review-side textarea:focus {
      outline: none;
      border-color: #f0c040;
    }
    .review-count {
      min-width: 70px;
      text-align: right;
    }
    .review-layout {
      display: grid;
      grid-template-columns: 250px minmax(380px, 1fr) 300px;
      gap: 12px;
      align-items: start;
    }
    .review-side,
    .review-main-card {
      background: #171b28;
      border: 1px solid #2b3246;
      border-radius: 8px;
      padding: 12px;
    }
    .list-side {
      max-height: calc(100vh - 146px);
      overflow: hidden;
      padding: 8px;
    }
    .review-mini-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: calc(100vh - 164px);
      overflow-y: auto;
      padding-right: 4px;
    }
    .review-mini-list button {
      display: grid;
      gap: 2px;
      text-align: left;
      background: #111522;
      color: #e8eaf0;
      border: 1px solid #283044;
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
    }
    .review-mini-list button:hover,
    .review-mini-list button.active {
      border-color: #f0c040;
    }
    .review-mini-list button.marked {
      box-shadow: inset 3px 0 0 #ff6b6b;
    }
    .review-mini-list small {
      color: #8f98ad;
      font-size: 0.68rem;
    }
    .review-nav {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .review-nav div {
      display: grid;
      gap: 3px;
      text-align: center;
    }
    .icon-btn {
      height: 40px;
      border-radius: 6px;
      border: 1px solid #394158;
      background: #111522;
      color: #f0c040;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .icon-btn:hover { border-color: #f0c040; }
    .review-card {
      min-height: 620px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 2px solid #d8c27a;
      border-radius: 8px;
      padding: 18px;
      background: #f7f0db;
      color: #1d2230;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    .review-card.item-card {
      min-height: 430px;
      background: #eef4f2;
      border-color: #7db8a8;
    }
    .review-card.ult-card {
      min-height: 430px;
      background: #f3ecfb;
      border-color: #8060a8;
    }
    .review-card-top {
      display: grid;
      grid-template-columns: 44px 1fr 48px;
      gap: 8px;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(29,34,48,0.22);
    }
    .review-card-top strong {
      font-size: 1.35rem;
      text-align: center;
    }
    .review-card-top span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid rgba(29,34,48,0.28);
      border-radius: 50%;
      font-weight: 700;
    }
    .review-stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .review-stat-row span,
    .review-tags span {
      border: 1px solid rgba(29,34,48,0.22);
      border-radius: 6px;
      padding: 6px;
      text-align: center;
      font-weight: 700;
      background: rgba(255,255,255,0.45);
    }
    .review-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
    }
    .review-tags em {
      color: #767b88;
      font-style: normal;
      font-size: 0.85rem;
      align-self: center;
    }
    .review-attack-mode {
      border: 1px solid #4a8fd8;
      border-radius: 6px;
      background: #e4effc;
      color: #17395e;
      padding: 8px 10px;
      font-weight: 700;
      text-align: center;
    }
    .review-effect {
      flex: 1;
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 1rem;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(29,34,48,0.18);
      border-radius: 6px;
      padding: 12px;
    }
    .review-ult {
      border: 1px solid #8060a8;
      border-radius: 6px;
      background: #eee6f6;
      padding: 10px;
      line-height: 1.5;
    }
    .review-ult-condition {
      border: 1px solid #8060a8;
      border-radius: 6px;
      background: #eee6f6;
      color: #3a2458;
      padding: 10px;
      font-weight: 700;
      line-height: 1.5;
    }
    .review-range-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 2px solid rgba(29,34,48,0.18);
      padding-top: 12px;
    }
    .review-range-grid {
      display: grid;
      gap: 4px;
      padding: 8px;
      background: #fffaf0;
      border: 1px solid rgba(29,34,48,0.2);
      border-radius: 6px;
    }
    .review-cell {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      border: 1px solid #c5c0b3;
      background: #fff;
      font-size: 0.62rem;
      font-weight: 700;
    }
    .review-cell.self {
      background: #263a5c;
      color: #fff;
      border-color: #263a5c;
    }
    .review-cell.attack { background: #f3a3a3; border-color: #bc4646; }
    .review-cell.counter { box-shadow: inset 0 0 0 3px #4a8fd8; }
    .review-cell.weak { color: #4c3300; background: #f6dc7a; border-color: #b78300; }
    .review-legend {
      display: grid;
      gap: 6px;
      color: #343948;
      font-size: 0.8rem;
      min-width: 78px;
    }
    .lg {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: -2px;
      background: #ddd;
    }
    .lg.attack { background: #f3a3a3; border: 1px solid #bc4646; }
    .lg.counter { background: #fff; border: 3px solid #4a8fd8; }
    .lg.weak { background: #f6dc7a; border: 1px solid #b78300; }
    .review-side h2 {
      color: #f0c040;
      font-size: 0.9rem;
      margin: 4px 0 8px;
    }
    .review-checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 14px;
    }
    .review-checks label {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #111522;
      border: 1px solid #283044;
      border-radius: 6px;
      padding: 8px;
      font-size: 0.82rem;
    }
    .review-checks input { accent-color: #f0c040; }
    .review-side textarea {
      min-height: 140px;
      resize: vertical;
      margin-bottom: 14px;
      line-height: 1.55;
    }
    .review-shared,
    .review-history,
    .review-shared-empty {
      background: #111522;
      border: 1px solid #283044;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    .review-shared-empty {
      color: #747d91;
    }
    .review-shared-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .review-shared-tags span {
      border: 1px solid #544922;
      border-radius: 999px;
      padding: 3px 8px;
      background: #2b2717;
      color: #f0c040;
      font-size: 0.74rem;
    }
    .review-shared-memo {
      color: #e8eaf0;
      white-space: pre-wrap;
    }
    .review-history ul {
      margin-left: 18px;
      color: #e8eaf0;
    }
    .review-history li {
      margin: 4px 0;
    }
    .review-history-global {
      margin-top: 10px;
      border-top: 1px solid #283044;
      padding-top: 8px;
      color: #8fb7ff;
      font-size: 0.78rem;
    }
    .review-history-global p + p {
      margin-top: 4px;
    }
    .review-detail-list {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 6px 8px;
      font-size: 0.8rem;
    }
    .review-detail-list dt { color: #8f98ad; }
    .review-detail-list dd {
      color: #e8eaf0;
      overflow-wrap: anywhere;
    }
    .review-empty {
      padding: 60px;
      text-align: center;
      background: #171b28;
      border: 1px solid #2b3246;
      border-radius: 8px;
      color: #9ca3b8;
    }
    @media (max-width: 980px) {
      .review-toolbar,
      .review-layout {
        grid-template-columns: 1fr;
      }
      .list-side,
      .review-mini-list {
        max-height: 220px;
      }
      .review-card {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
